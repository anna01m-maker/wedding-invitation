<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аргишт & Анна — Свадьба</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    color: #F5F1E8;
    background: #0b0b0b;
}

.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
    url('YOUR_PHOTO_HERE.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 64px;
    letter-spacing: 4px;
    margin: 0;
}

.date {
    margin-top: 20px;
    letter-spacing: 6px;
    font-size: 18px;
}

.section {
    padding: 80px 20px;
    text-align: center;
    max-width: 800px;
    margin: auto;
}

.line {
    width: 60px;
    height: 1px;
    background: #F5F1E8;
    margin: 30px auto;
}

.button {
    margin-top: 30px;
    padding: 12px 28px;
    border: 1px solid #F5F1E8;
    background: transparent;
    color: #F5F1E8;
    text-decoration: none;
    transition: 0.3s;
}

.button:hover {
    background: #F5F1E8;
    color: #000;
}
</style>
</head>

<body>

<section class="hero">
    <div>
        <h1>АРГИШТ & АННА</h1>
        <div class="date">15 АВГУСТА 2026</div>
    </div>
</section>

<section class="section">
    <div class="line"></div>
    <p>Приглашаем вас разделить с нами радость нашего свадебного дня</p>
</section>

<section class="section">
    <h2>Место проведения</h2>
    <div class="line"></div>
    <p>г. Суздаль<br>
    ГК «Николаевский Посад»<br>
    ул. Ленина, д. 138</p>
</section>

<section class="section">
    <h2>Подтверждение</h2>
    <div class="line"></div>
    <a href="#" class="button">Подтвердить присутствие</a>
</section>

</body>
</html>
